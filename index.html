<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Resume Builder</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">
    <div class="form-container">
        <h1>Resume Builder</h1>

        <form id="resumeForm">
            <!-- Full Name -->
            <div class="form-group">
                <label for="fullName">Full Name</label>
                <input type="text" id="fullName" placeholder="Enter your full name">
            </div>

            <!-- Title -->
            <div class="form-group">
                <label for="title">Professional Title</label>
                <input type="text" id="title" placeholder="e.g. Software Engineer">
            </div>

            <!-- Email -->
            <div class="form-group">
                <label for="email">Email</label>
                <input type="email" id="email" placeholder="Enter your email">
            </div>

            <!-- Phone -->
            <div class="form-group">
                <label for="phone">Phone</label>
                <input type="text" id="phone" placeholder="Enter your phone number">
            </div>

            <!-- Skills -->
            <div class="form-group">
                <label for="skills">Skills</label>
                <textarea id="skills" placeholder="Enter your skills"></textarea>
            </div>

            <!-- Experience -->
            <div class="form-group">
                <label for="experience">Experience</label>
                <textarea id="experience" placeholder="Enter your experience"></textarea>
            </div>

            <button type="button" onclick="generateResume()">Generate Resume</button>
        </form>
    </div>

    <!-- Preview Section -->
    <div class="preview-container" id="resumePreview">
        <h2 id="previewName"></h2>
        <p id="previewTitle"></p>
        <p id="previewEmail"></p>
        <p id="previewPhone"></p>
        <h3>Skills</h3>
        <p id="previewSkills"></p>
        <h3>Experience</h3>
        <p id="previewExperience"></p>
    </div>
</div>

<script src="script.js"></script>
</body>
</html>
